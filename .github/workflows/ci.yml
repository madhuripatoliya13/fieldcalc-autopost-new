name: CI

on:
  push:
    paths: ["instagram-autopost/**"]
  pull_request:
    paths: ["instagram-autopost/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: instagram-autopost
    env:
      DRY_RUN: "true"
      IMAGING_FORCE_PILLOW: "true"   # no Chromium download needed in CI
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest -q
